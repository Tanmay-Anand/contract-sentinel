spring:
  application:
    name: contract-sentinel
  datasource:
    url: ${SENTINEL_DB_URL:jdbc:postgresql://localhost:5432/contract_sentinel}
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time-zone: UTC
  jackson:
    time-zone: UTC

server:
  port: 8090

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    doc-expansion: none

sentinel:
  poll:
    interval-ms: 300000        # 5 minutes between polls
    initial-delay-ms: 15000    # 15s grace period on startup
  services:
    # List the services you want to monitor here.
    # Each entry is seeded into the DB on startup (duplicates are skipped).
    - name: "my-service"
      baseUrl: "http://localhost:8080"
      specPath: "/v3/api-docs"
    # - name: "another-service"
    #   baseUrl: "http://localhost:8081"
    #   specPath: "/v3/api-docs"
  manual-dependencies:
    # List manual service dependencies here (not auto-detectable via actuator/env).
    # Examples: shared-database, internal-rest calls, webhooks.
    # - source: "service-a"
    #   target: "service-b"
    #   propertyName: "shared-database"
    #   endpointCallsJson: null
  docker:
    enabled: false
  gateway:
    url: ""
  db:
    schema: public
  performance:
    retention-days: 30          # how long to keep endpoint performance snapshots
  traces:
    retention-hours: 24         # how long to keep collected trace spans (100% sampling grows fast)
  frontend:
    # Absolute path to a frontend source tree the schema-risk agent greps for column references.
    # Leave blank to disable the frontend_grep agent tool.
    source-dir: ${SENTINEL_FRONTEND_SOURCE_DIR:}
  llm:
    provider: ${SENTINEL_LLM_PROVIDER:ollama}   # ollama | claude
    max-iterations: 10
    request-timeout-seconds: 120
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:qwen2.5:14b}
      native-tools: true
    claude:
      base-url: https://api.anthropic.com
      model: ${SENTINEL_LLM_CLAUDE_MODEL:claude-sonnet-4-5}
      max-tokens: 2048
      api-key: ${SENTINEL_LLM_CLAUDE_API_KEY:}   # never commit a real key

logging:
  level:
    io.contractsentinel: info
